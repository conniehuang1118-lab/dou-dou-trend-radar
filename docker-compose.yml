services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: trend_radar
      POSTGRES_USER: trend
      POSTGRES_PASSWORD: trend
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://trend:trend@db:5432/trend_radar
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pg_data:
